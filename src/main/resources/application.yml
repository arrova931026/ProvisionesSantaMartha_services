spring:
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  datasource:
    url: jdbc:postgresql://santa_martha_bd_user:jDXx0WgBoCWqckvxZzoMEoJtVfX8AACb@dpg-d8m0501kh4rs73964g40-a/santa_martha_bd
    username: ${DB_USERNAME:santa_martha_bd_user}
    password: ${DB_PASSWORD:jDXx0WgBoCWqckvxZzoMEoJtVfX8AACb}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: FunerariaHikariPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: funeraria
        format_sql: true
        jdbc:
          time_zone: UTC

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

server:
  port: ${PORT:8081}
  servlet:
    context-path: /api

app:
  jwt:
    secret: ${JWT_SECRET:cambia-esta-clave-secreta-en-produccion-minimo-256-bits-segura}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}          # 24 h
    refresh-expiration-ms: ${JWT_REFRESH_MS:604800000}    # 7 d
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:4200,http://localhost:3000,http://192.168.0.102:4200,http://192.168.0.102:3000}
  profile-pictures-dir: ${PROFILE_PICTURES_DIR:/profile_pictures}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.shsm: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN